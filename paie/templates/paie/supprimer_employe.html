{% extends 'base.html' %}

{% block content %}
    <h1>{{ title }}</h1>
    
    <p>Вы уверены, что хотите удалить сотрудника <strong>{{ employe.prenom }} {{ employe.nom }}</strong> ?</p>
    <p>Это действие необратимо.</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'liste_employes' %}" class="btn btn-secondary">Отмена</a>
    </form>
{% endblock %}
