{% extends 'base.html' %}

{% block content %}
    <h1>{{ title }}</h1>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="nom">Название должности :</label>
            <input type="text" name="nom" id="nom" class="form-control" value="{{ poste.nom }}" required>
        </div>
        
        <div class="form-group">
            <label for="slug">Slug (URL) :</label>
            <input type="text" name="slug" id="slug" class="form-control" value="{{ poste.slug }}" placeholder="Оставьте пустым для автоматической генерации">
            <small>Slug будет использоваться в URL. Пример: "buhgalteriya"</small>
        </div>
        
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'liste_postes' %}" class="btn btn-secondary">Отмена</a>
    </form>
{% endblock %}
